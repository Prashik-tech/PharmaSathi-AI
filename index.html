<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmaSathi AI</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<nav class="navbar">
<div class="logo">💙 PharmaSathi AI</div>
</nav>

<div class="container">

<h1 class="logo-title">💙 PharmaSathi AI</h1>

<p class="tagline">
Intelligent Multilingual Medicine Assistant
</p>

<h2>Medicine Search</h2>

<input
id="medicineInput"
class="search-box"
placeholder="Search Medicine">

<button id="searchBtn" class="search-btn">
Search
</button>

<div id="result" class="result-box">
Search for a medicine...
</div>

<hr>

<h2>Drug Interaction Checker</h2>

<input
id="drug1"
class="search-box"
placeholder="First Medicine">

<br><br>

<input
id="drug2"
class="search-box"
placeholder="Second Medicine">

<button
id="interactionBtn"
class="search-btn">
Check Interaction
</button>

<div
id="interactionResult"
class="result-box">
Enter two medicines.
</div>

</div>

<footer class="footer">
<p>© 2026 PharmaSathi AI</p>
<p>Version 1.0</p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
