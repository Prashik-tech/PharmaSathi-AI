<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaSathi AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>💙 PharmaSathi AI</h1>

    <p class="subtitle">
        Intelligent Multilingual Medicine Assistant
    </p>

    <input
    type="text"
    id="medicineInput"
    placeholder="🔍 Search Medicine..."
    class="search-box">

<button id="searchBtn" class="search-btn">
    Search
</button>

<div id="result" class="result-box">
    Search for a medicine to view information.
</div>

    <div class="cards">

        <div class="card">
            🤖
            <h3>AI Assistant</h3>
        </div>

        <div class="card">
            📷
            <h3>Prescription Scanner</h3>
        </div>

        <div class="card">
            💊
            <h3>Drug Interaction</h3>
        </div>

        <div class="card">
            ⏰
            <h3>Medicine Reminder</h3>
        </div>

    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
